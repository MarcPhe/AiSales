<div class="auth-container">
  <div class="auth-card">
    <h1>Register</h1>
    <form ng-submit="handleSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          ng-model="email" 
          required
        />
      </div>
      <div class="form-group">
        <label>Business Name</label>
        <input 
          type="text" 
          ng-model="businessName" 
          required
        />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input 
          type="password" 
          ng-model="password" 
          required
        />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input 
          type="password" 
          ng-model="confirmPassword" 
          required
        />
      </div>
      <div ng-if="error" class="error-message">{{error}}</div>
      <button type="submit" ng-disabled="loading">
        {{loading ? 'Creating account...' : 'Register'}}
      </button>
    </form>
    <p class="auth-link">
      Already have an account? <a href="#!/login">Login here</a>
    </p>
  </div>
</div>
