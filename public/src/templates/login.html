<div class="auth-container">
  <div class="auth-card">
    <h1>Login</h1>
    <form ng-submit="handleSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          ng-model="email" 
          required
        />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input 
          type="password" 
          ng-model="password" 
          required
        />
      </div>
      <div ng-if="error" class="error-message">{{error}}</div>
      <button type="submit" ng-disabled="loading">
        {{loading ? 'Logging in...' : 'Login'}}
      </button>
    </form>
    <p class="auth-link">
      Don't have an account? <a href="#!/register">Register here</a>
    </p>
  </div>
</div>
