<div class="business-profile">
  <div class="profile-header">
    <button class="back-btn" ng-click="handleBack()">← Back</button>
    <h1>Business Profile</h1>
  </div>

  <div ng-if="loading" class="loading">Loading...</div>

  <div class="profile-container" ng-if="!loading">
    <form ng-submit="handleSubmit()" class="profile-form">
      <div ng-if="success" class="success-message">{{success}}</div>
      <div ng-if="error" class="error-message">{{error}}</div>

      <div class="form-section">
        <h2>Company Information</h2>
        
        <div class="form-group">
          <label>Company Name</label>
          <input 
            type="text" 
            ng-model="profile.company_name"
            ng-change="handleChange('company_name', profile.company_name)"
            placeholder="Enter your company name"
          />
        </div>

        <div class="form-group">
          <label>Industry</label>
          <select 
            ng-model="profile.industry"
            ng-change="handleChange('industry', profile.industry)"
          >
            <option value="">Select an industry</option>
            <option value="Technology">Technology</option>
            <option value="Finance">Finance</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Retail">Retail</option>
            <option value="Manufacturing">Manufacturing</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Website URL</label>
          <input 
            type="url"
            ng-model="profile.website"
            ng-change="handleChange('website', profile.website)"
            placeholder="https://example.com"
          />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input 
            type="tel"
            ng-model="profile.phone"
            ng-change="handleChange('phone', profile.phone)"
            placeholder="Enter your phone number"
          />
        </div>

        <div class="form-group">
          <label>Address</label>
          <input 
            type="text"
            ng-model="profile.address"
            ng-change="handleChange('address', profile.address)"
            placeholder="Enter your business address"
          />
        </div>

        <div class="form-group">
          <label>Logo URL</label>
          <input 
            type="url"
            ng-model="profile.logo_url"
            ng-change="handleChange('logo_url', profile.logo_url)"
            placeholder="https://example.com/logo.png"
          />
          <div ng-if="profile.logo_url" class="logo-preview">
            <img src="{{profile.logo_url}}" alt="Logo preview" />
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea 
            ng-model="profile.description"
            ng-change="handleChange('description', profile.description)"
            placeholder="Enter your company description"
            rows="4"
          ></textarea>
        </div>
      </div>

      <button type="submit" class="submit-btn" ng-disabled="saving">
        {{saving ? 'Saving...' : 'Save Changes'}}
      </button>
    </form>
  </div>
</div>
